server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so upstream is resolved at request time,
    # not at startup — prevents crash when ERPNext frontend isn't up yet
    resolver 127.0.0.11 valid=30s;

    # React SPA — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to ERPNext running on the host at :8080
    # host.docker.internal resolves to the Mac host from inside a container
    # Cookie header stripped so Frappe uses token auth and skips CSRF check
    location /api {
        set $erpnext http://host.docker.internal:8080;
        proxy_pass         $erpnext;
        proxy_set_header   Host rifah.localhost;
        proxy_set_header   Cookie "";
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy /files (ERPNext file attachments)
    location /files {
        set $erpnext http://host.docker.internal:8080;
        proxy_pass       $erpnext;
        proxy_set_header Host rifah.localhost;
    }
}
